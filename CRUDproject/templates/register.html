
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #7d31d3, #f7f7f7,#1a1818);
    }

    .login-container{
      background:#fff;
      padding:40px;
      width:350px;
      border-radius:12px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    .login-container h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#555;
      font-weight:bold;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
      transition:0.3s;
    }

    .input-group input:focus{
      border-color:#4facfe;
      outline:none;
      box-shadow:0 0 5px rgba(79,172,254,0.5);
    }

    .login-btn{
      width:100%;
      padding:12px;
      background:#1d87ff;
      border:none;
      border-radius:8px;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#2196f3;
    }

    .extra-links{
      margin-top:15px;
      text-align:center;
    }

    .extra-links a{
      text-decoration:none;
      color:#4facfe;
      font-size:14px;
    }

    .extra-links a:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Register</h2>
 
    <form action="/iplapp/register/" method="POST">
        {%csrf_token%}
      <div class="input-group">
        <label>User Name</label>
        <input type="username" name="uname" placeholder="User Name" required>
      </div>

      <div class="input-group">
      <label>Email</label>
        <input type="email" name="em" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="pwd" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">Sign up</button>

      <div class="extra-links">
        <p><a href="#">Forgot Password?</a></p>
      </div>
    </form>
    <br>
    <div style="text-align: center;">
    {% if err %}
        <p style="color: red;" >{{err}}</p>
    {%endif%}
    </div>
  </div>
 
</body>
</html>
