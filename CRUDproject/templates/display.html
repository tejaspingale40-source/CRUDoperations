<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #5a0956, #f7f7f7,#074202);
      align-items:center;
      padding:100px;
       height:100vh;
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    table{
      width:90%;
      margin:auto;
      border-collapse:collapse;
      background:white;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    th, td{
      border:1px solid #ddd;
      padding:12px;
      text-align:center;
    }

    th{
      background:#ff9800;
      color:white;
    }

    tr:nth-child(even){
      background:#f9f9f9;
    }

    tr:hover{
      background:#fff3e0;
    }
  </style>
    <title>Display</title>
</head >
<body style="text-align: center;"><br>
    <br>
    <h1 style="color: brown;">All players Records</h1>
    
    

    <table >
    <tr>
      <th>Jersey No</th>
      <th>Player Name</th>
      <th>Runs</th>
      <th>Wickets</th>
      <th>Action</th>
      
    </tr>

    {%for p in db%}

    <tr>
        
      <td>{{p.jn}}</td>
      <td>{{p.pname}}</td>
      <td>{{p.run}}</td>
      <td>{{p.wickets}}</td>
      <td><a href="/iplapp/update/{{p.pname}}/" class="btn btn-warning">Update</a> <a href="/iplapp/delete/{{p.pname}}/" class="btn btn-danger">Delete</a></td>

      
    </tr>
    {%endfor%}
    </table>
    <br>
    <br>
    
    <a href="/iplapp/create/" class="btn btn-primary">Add Players</a>
    

</body>
</html>
